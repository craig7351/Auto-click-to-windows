name: Build

on:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: .\build.bat

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AfkKeeper
          path: AfkKeeper.exe

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: AfkKeeper.exe
